name: AntiSpamPlugin
version: 1.0.0
main: com.antispam.AntiSpamPlugin
api-version: 1.21
description: Anti spam plugin with Discord logging
authors: [You]

commands:
  asunmute:
    description: Unmute a player
    usage: /asunmute <player>
    permission: antispam.admin
  asmute:
    description: Manually mute a player
    usage: /asmute <player> <minutes>
    permission: antispam.admin
  spamcheck:
    description: Check a player's spam stats
    usage: /spamcheck <player>
    permission: antispam.admin
  asreset:
    description: Reset a player's offences
    usage: /asreset <player>
    permission: antispam.admin

permissions:
  antispam.admin:
    description: Access to antispam admin commands
    default: op
  antispam.bypass:
    description: Bypass spam detection
    default: op
